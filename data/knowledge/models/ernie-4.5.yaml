summary: |
  百度文心大模型最新版本，基于知识增强架构。ERNIE 4.5 在中文
  理解、知识问答、搜索增强方面表现突出，是中国最早对标 GPT-4
  的大模型之一。

significance: |
  百度是中国最早全面投入大模型的互联网巨头。ERNIE 系列从 2019 年
  的 ERNIE 1.0 开始，采用"知识增强"（Knowledge Enhancement）
  技术路线——将知识图谱和大模型结合，提升事实准确性和推理能力。

  ERNIE 4.5 的差异化：
  - 搜索增强：天然整合百度搜索引擎，实时获取最新信息
  - 知识增强：百度知识图谱积累 10 年+，事实准确度更高
  - 中文深度：对中国文化、诗词、历史等理解超越 GPT-4
  - 行业覆盖：在医疗、法律、金融等垂直领域有定制版本

background: |
  百度 2019 年发布 ERNIE 1.0，是中国最早的大模型之一。2023 年
  文心一言（ERNIE Bot）面向公众开放。2024-2025 年持续迭代，
  ERNIE 4.0/4.5 逐步缩小与 GPT-4 的差距。

