summary: |
  阿里巴巴通义团队的开源大模型，涵盖 0.5B 到 72B 多个尺寸。
  Qwen 2.5 在数学、编程、多语言理解等基准测试中表现顶尖，
  是 HuggingFace 上下载量最高的开源 LLM 系列之一。

significance: |
  Qwen 2.5 是全球最成功的开源大模型家族之一。其最大特点是
  "全尺寸覆盖 + Apache 2.0 协议"——从 0.5B 的嵌入式模型到
  72B 的旗舰模型，全部开源且商业友好，极大降低了企业和开发者
  部署大模型的门槛。

  技术特点：
  - 数学推理顶尖：MATH 基准 >90%，在开源模型中领先
  - 编程能力强：HumanEval 得分 85%+
  - 多语言支持：中英双语 + 27 种语言
  - 长上下文：支持 128K token
  - 生态完善：HuggingFace Transformers、vLLM、Ollama 等
    推理框架全面支持

  Qwen 2.5 的成功证明了开源模式在 LLM 领域的可行性。

background: |
  阿里 Qwen 系列始于 2023 年 4 月的通义千问。2024 年 6 月
  Qwen 2.0 开源即引发全球关注。2025 年 1 月 Qwen 2.5 发布，
  在数学和代码基准上实现显著跃升。HuggingFace 累计下载量
  在 2025 年中突破 1 亿次。

