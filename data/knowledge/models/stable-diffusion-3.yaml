summary: |
  Stability AI 最新一代文生图模型，采用 MMDiT 架构，
  在文本遵循和图像质量上大幅超越 SDXL。

significance: |
  Stable Diffusion 3 引入了全新的 MMDiT（Multimodal Diffusion
  Transformer）架构，放弃了传统的 U-Net 骨干网，
  标志着图像生成从"扩散模型"到"Transformer 扩散"的范式转变。

  SD3 在文本遵循（拼写、排版）上比 SDXL 进步巨大，
  但仍未能完全追赶 Midjourney v6 和 DALL-E 3。

  Stability AI 管理层动荡（CEO 离职）导致 SD3 发布延期，
  开源社区对此感到沮丧但对模型本身评价积极。

background: |
  SD3 从 2023 年底开始训练，使用 MMDiT 新架构。
  2024 年 6 月发布，同时开源权重。

