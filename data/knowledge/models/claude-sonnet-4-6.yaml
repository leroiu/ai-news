summary: |
  Anthropic 的快速高效模型，速度价格比最优。
  Claude Code 默认引擎，日常编码任务的首选。

significance: |
  Sonnet 4.6 是速度/质量/成本三位一体的最优解。
  在保持高质量代码生成的同时，推理速度是 Opus 的 3-5 倍，
  API 成本仅为 Opus 的 ~29%。

  这种"快模型 + 慢模型"的产品设计（Sonnet 快速 → Opus 深度）
  是 Anthropic 区别于 OpenAI 的核心策略之一。
  Claude Code 用 Sonnet 处理 80% 日常任务，Opus 处理复杂问题。

background: |
  Claude Sonnet 系列定位为"工作马"，快且便宜但不牺牲质量。
  Sonnet 4.6 是这一系列的最成熟版本，
  Claude Fable 5 发布后仍作为"Fast Mode"引擎存在。

