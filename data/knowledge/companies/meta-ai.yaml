summary: |
  Meta 的 AI 研究部门，全球最大的开源 AI 模型发布者。
  Llama 系列是开源社区最广泛使用的 LLM 基础模型。

significance: |
  Meta AI 的战略定位是"开源 AI 的旗手"。Llama 2/3/4
  系列以开放权重发布，催生了全球数千个衍生模型和创业公司。

  2025-2026 年 Meta 在 AI 基础设施上的资本支出超 $60B/年，
  建设了全球最大的 AI 训练集群之一。Zuckerberg 将开源 AI
  定位为"对抗封闭平台的战略武器"。

  FAIR (Facebook AI Research) 在基础研究上保持极高水准，
  PyTorch 已成为 AI 开发的事实标准。

background: |
  2013 年 Yann LeCun 加入 Facebook 创办 FAIR。
  2018 年 PyTorch 1.0 发布。
  2023 年 Llama 系列发布（2→3→4）。
  2025-2026 年 Meta 转型为 AI-first 公司。

