summary: |
  欧洲最领先的 AI 创业公司，法国独角兽。
  以小型高效的开源模型（Mistral 7B）起步，后转向商业闭源。

significance: |
  Mistral AI 是"欧洲 AI 独立性"的旗帜。三位创始人出身 Meta AI，
  2023 年仅用 4 周融资 $120M（种子轮破纪录），估值 $3B。

  Mistral 7B（2023-09）证明了小型模型可以匹敌大得多的模型，
  参数效率极致优化。后续 Mixtral (MoE)、Mistral Large 2 持续迭代。

  2024 年从纯开源转向"开源 + 商业"混合策略，
  2025 年完成 ~$650M 融资，2026 年估值 $10B+。

background: |
  Mistral 由三位法国 AI 科学家在巴黎创立，出身 Meta FAIR。
  快速崛起为欧洲估值最高的 AI 纯初创公司。

