summary: |
  中国 AI 创业公司，以极低训练成本的顶尖开源模型震惊全球。
  DeepSeek R1 的推理能力与 OpenAI o1 相当，但完全开源。

significance: |
  DeepSeek 是 2025 年 AI 行业最大的黑马。DeepSeek V3 以
  $5.5M 训练成本达到 GPT-4 级别性能（当时 GPT-4 训练成本估 $100M+），
  证明了顶级 LLM 不需要顶级预算。

  DeepSeek R1（2025-01）开源了最强推理模型，引发生态爆炸——
  数百个衍生模型、HuggingFace 下载量破亿。

  DeepSeek 的出现也改变了 AI 地缘政治叙事：
  证明了出口管制无法阻止中国 AI 创新，反而激发了效率创新。

  2026 年 DeepSeek 持续开源新模型，成为中国 AI 追赶美国
  的标志性案例。

background: |
  2023 年梁文锋创立 DeepSeek（母公司：幻方量化）。
  2024 年发布 V2（MoE 架构，行业领先的成本效率）。
  2025-01: V3 + R1 发布，全球爆红。
  2025-2026: 持续开源模型迭代。

