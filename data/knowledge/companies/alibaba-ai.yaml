summary: |
  阿里巴巴通过阿里云和通义（Tongyi）品牌全面投入 AI。Qwen 系列
  开源模型是中国最成功的开源大模型家族，HuggingFace 下载量居
  全球前列。通义千问 APP 是中国主流 AI 助手之一。

significance: |
  阿里巴巴在 AI 领域的核心资产是"云+模型+应用"三位一体：
  - 阿里云是中国最大云服务商，提供 AI 推理和训练基础设施
  - Qwen 系列是全球下载量最高的开源大模型之一，生态完善
  - 通义千问 APP + 钉钉 AI + 淘宝 AI 形成 C 端 + B 端全覆盖

  Qwen 2.5 系列涵盖 0.5B 到 72B 多个尺寸，在数学、编程、
  多语言理解等基准测试中表现顶尖。阿里积极开源，模型采用
  Apache 2.0 协议，对开发者极友好。

background: |
  阿里在 AI 领域的布局始于阿里云（2009）和达摩院（2017）。
  2023 年发布通义千问大模型，2024 年 Qwen 2.0 系列开源，
  2025 年 Qwen 2.5 发布，成为全球最受欢迎的开源 LLM 之一。
  同时阿里投资了月之暗面、智谱、MiniMax 等多家 AI 公司。

