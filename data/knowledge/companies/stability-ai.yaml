summary: |
  Stable Diffusion 的母公司，开源图像生成革命的发起者。
  经历管理层动荡后转型为商业化 AI 媒体工具公司。

significance: |
  Stability AI 2022 年 8 月发布 Stable Diffusion——
  首个可以运行在家用 GPU 上的高质量文本生成图像模型。
  这在当时是革命性的：让图像生成从 OpenAI DALL-E 的"云端特权"
  变成了"人人可用"。

  Stable Diffusion 催生了全球数百个衍生工具和插件的生态，
  ControlNet、LoRA 微调等方法论也因 SD 生态而普及。

  2024 年 CEO Emad Mostaque 离职后公司收缩重组，
  2025-2026 年专注于 Stable Diffusion 3/4 和 Stable Audio/Video 商业化。

background: |
  2019 年由 Emad Mostaque 在伦敦创立。
  2022 年联合 CompVis 等学术团队发布 Stable Diffusion。
  2024 年管理层重组，Mostaque 离职。
  2025 年发布 SD3 和 Stable Video Diffusion。

