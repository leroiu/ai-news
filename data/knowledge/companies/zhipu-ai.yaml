summary: |
  智谱 AI 是中国大模型先驱，由清华大学唐杰教授创立。GLM 系列模型以
  独特的中英双语训练 + All-Tools 架构著称，ChatGLM 是中国最早开源
  大模型之一。2025 年融资超 25 亿美元，估值超 200 亿。

significance: |
  智谱 AI 的核心价值在于"技术原创性"——GLM 架构不同于 GPT 的
  decoder-only，采用自研的 General Language Model 路线，在中文
  理解和多工具调用方面有独特优势。

  ChatGLM-6B（2023）是中国第一个广泛使用的中文开源大模型，
  极大推动了中国 AI 开发者生态。GLM-4（2024）引入 All-Tools
  架构，模型可自主调用搜索、代码解释器、文生图等多种工具。

  2025 年获得沙特阿美、腾讯、阿里等巨额融资，成为估值最高的
  中国大模型创业公司之一。

background: |
  智谱 AI 源自清华大学 KEG 实验室，2019 年正式成立。核心技术积累
  始于 2006 年的科技情报挖掘（AMiner）。2021 年发布 GLM-10B，
  2023 年 ChatGLM-6B 开源爆火，2024 年 GLM-4 达到 GPT-4 水平，
  2025 年 GLM-4.5 发布，持续迭代。

