summary: |
  MiniMax（稀宇科技）是中国多模态 AI 公司，以海螺 AI（Hailuo AI）
  产品闻名，在语音合成、视频生成和东南亚出海方面独树一帜。
  MiniMax-01 模型以 456B 参数和 4M token 上下文窗口著称。

significance: |
  MiniMax 的独特之处在于"多模态 + 出海"双引擎战略。海螺 AI 在
  东南亚市场表现强劲，是中国 AI 出海最成功的案例之一。

  技术上，MiniMax-01 采用创新的 Lightning Attention 线性注意力
  机制，实现 4M token 的超长上下文。语音合成（TTS）技术被广泛
  采用于游戏、社交、内容创作场景。

  MiniMax 的差异化路线：不追求通用 AGI，而是聚焦多模态交互
  （语音+视频+文本），瞄准娱乐和内容创作市场。

background: |
  闫俊杰（前商汤科技高管）2021 年创立 MiniMax，早期以语音合成
  和虚拟人技术切入。2023 年发布海螺 AI 对话助手，2024 年推出
  视频生成能力，2025 年 MiniMax-01 模型发布，同时海螺 AI 在
  东南亚多国 APP Store 登顶。

