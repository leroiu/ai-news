summary: |
  NVIDIA 联合创始人兼 CEO，GPU 革命的领袖。
  NVIDIA 市值 2024 年突破 $3T，成为全球市值最高公司之一。

significance: |
  Jensen Huang 在 1993 年创办 NVIDIA 时专注游戏 GPU，
  但 2006 年推出 CUDA（GPU 通用计算平台）是转折点——
  这一决定让 NVIDIA 在深度学习时代成为唯一的基础设施供应商。

  每一代 GPT 和几乎所有大模型都在 NVIDIA GPU 上训练。
  NVIDIA 的 AI 芯片（A100、H100、B200）年复一年供不应求，
  本质上是 AI 时代的"卖铲人"。

  2025-2026 年发布 Blackwell (B200/B300) 系列，
  2026 GTC 宣布 DGX AI Factory 战略。

background: |
  台湾出生，9 岁移民美国。斯坦福电子工程硕士。
  30 岁生日那天（1993 年 2 月 17 日）共同创立 NVIDIA。

  2006 年推出 CUDA，2012 年 AlexNet 用 GPU 训练引爆需求。
  此后 NVIDIA 从游戏公司转型为 AI 计算平台。

