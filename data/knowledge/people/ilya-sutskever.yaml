summary: |
  OpenAI 联合创始人、前首席科学家，AlexNet 共同发明者，
  2024 年离开 OpenAI 创办 Safe Superintelligence Inc. (SSI)。

significance: |
  Ilya Sutskever 是深度学习历史中最重要的人物之一。
  2012 年作为 AlexNet 的第一作者开启了深度学习革命，
  随后在 Google Brain 发明了 Sequence-to-Sequence 模型。

  作为 OpenAI 首席科学家，他领导了 GPT-2/3/4 的技术方向。
  2023 年 11 月参与解雇 Sam Altman 的决定性投票是 AI 行业最戏剧性的事件，
  揭示了他对 AI 安全极端担忧的立场。

  2024 年 6 月创办 SSI，专注"安全的超级智能"，
  第一轮融资 $1B，估值 $5B。

background: |
  出生于俄罗斯，在以色列长大，后移居加拿大。
  师从 Geoffrey Hinton，在多伦多大学获得博士学位。

  2012: AlexNet（ImageNet 冠军，深度学习爆发点）
  2014: Sequence-to-Sequence 模型（Google Brain）
  2015: 联合创立 OpenAI
  2023-11: 投票解雇 Altman，后公开道歉
  2024-05: 离开 OpenAI
  2024-06: 创办 SSI

