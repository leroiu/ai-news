summary: |
  Anthropic CEO 兼联合创始人，前 OpenAI 研究副总裁，
  AI 安全领域的旗帜人物，"Scaling Laws" 论文第一作者。

significance: |
  Dario Amodei 是 AI 安全运动的核心领导者。在 OpenAI 期间
  发现 Scaling Laws（模型大小/数据量/计算量与性能的幂律关系），
  直接塑造了此后整个 LLM 行业的研发方向。

  2021 年因对 OpenAI 安全方向的不满，与妹妹 Daniela Amodei 等
  7 名前 OpenAI 员工共同创立 Anthropic，以"Constitutional AI"和
  安全研究为核心竞争力。

  2024-2026 年 Anthropic 估值从 $5B 飙升至 $118B+
  （LightSpeed $10B 投资），成为仅次于 OpenAI 的第二大 AI 公司。
  Claude Code 已成为最强的 AI 编程工具之一。

background: |
  普林斯顿物理学本科，斯坦福神经科学博士。
  在百度硅谷 AI 实验室工作后加入 Google Brain，随后加入 OpenAI。

  核心贡献：
  - Scaling Laws for Neural Language Models (2020)
  - Anthropic 联合创始人 (2021)
  - Constitutional AI 方法论
  - Claude 模型家族

