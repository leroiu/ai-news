summary: |
  "深度学习之父"，2018 年图灵奖得主，神经网络研究先驱。
  2023 年离开 Google 后成为 AI 风险的最重要警告者之一。

significance: |
  Geoffrey Hinton 在过去 40 年中坚持神经网络研究，
  即便在 AI 寒冬期间也未曾动摇。他的反向传播算法、
  Boltzmann Machine、Deep Belief Networks 构成了
  深度学习的理论根基。

  2012 年他和学生 Ilya Sutskever、Alex Krizhevsky 的
  AlexNet 在 ImageNet 上获胜，直接引爆了这一轮 AI 革命。

  2023 年离开 Google 后公开警告 AI 的 Existential Risk，
  引发了公共舆论对 AI 安全的广泛关注。
  2024 年获诺贝尔物理学奖（与 John Hopfield 共享）。

background: |
  英国出生，剑桥实验心理学毕业，爱丁堡大学 AI 博士。
  曾在 CMU、UCL 任教，1987 年移居加拿大多伦多大学。

  2013 年加入 Google Brain（经其学生创办的 DNNresearch 收购）。
  2023 年离开 Google，公开谈论 AI 风险。

