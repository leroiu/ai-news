summary: |
  前 Tesla AI 总监、OpenAI 创始团队成员，著名 AI 教育家。
  通过 YouTube 教学视频和 NanoGPT 项目普及了 LLM 原理。

significance: |
  Karpathy 是"AI 教育者"这一角色的开创者。他的 Stanford CS231n
  卷积神经网络课程是这十年来最受欢迎的 AI 课程。2023-2024 年
  他的 YouTube 系列"Let's Build GPT from Scratch"和"Neural Networks:
  Zero to Hero"让数万开发者理解了 LLM 底层原理。

  在 Tesla 期间主导 Autopilot 视觉系统的 AI 化转型。
  2024 年离开 OpenAI 后创办 Eureka Labs，专注 AI 教育。

background: |
  斯洛伐克出生，移居加拿大。多伦多大学本科（师从 Hinton），
  斯坦福博士（师从 Fei-Fei Li），博士论文：图像描述生成。

  OpenAI 创始团队 → Tesla AI 总监 → 回归 OpenAI → Eureka Labs

