summary: |
  Google Brain 团队发表 Transformer 架构论文，提出完全基于
  注意力机制的序列模型。这篇论文奠定了现代大语言模型的基础。

significance: |
  "Attention Is All You Need" 是 AI 历史上最重要的论文之一。

  在 Transformer 之前，NLP 主流架构是 RNN/LSTM/GRU ——
  串行处理、训练慢、长序列效果差。Transformer 用完全基于
  注意力机制的并行架构彻底改变了这一局面：

  - 训练效率提升 10-100 倍（完全并行）
  - 长距离依赖问题得到根本性解决
  - 催生了 BERT、GPT、T5 等一系列预训练大模型
  - 最终扩散到计算机视觉（ViT）、语音、多模态等所有领域

  可以说，没有 Transformer 就没有 GPT，没有 ChatGPT，
  没有今天的一切大语言模型。Transformer 是当代 AI 的基石。

background: |
  2017 年 6 月，Google Brain / Google Research 的 8 位作者
  （Vaswani et al.）在 NIPS 2017 发表该论文。

  核心创新：
  1. Self-Attention 机制 — 序列中每个位置直接关注所有其他位置
  2. Multi-Head Attention — 并行学习多种注意力模式
  3. Positional Encoding — 保留位置信息
  4. Encoder-Decoder 架构 — 编码器处理输入，解码器生成输出

  论文最初为机器翻译设计，但很快被扩展到所有 NLP 任务。
  截至 2026 年被引用超 150,000 次，是 CS 领域引用最高的论文之一。

