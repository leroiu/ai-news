summary: |
  2024 年 2 月 15 日，OpenAI 发布 Sora 视频生成模型，
  展示了一分钟级、物理一致的 AI 生成视频，被视为 AI 视频
  生成的"GPT 时刻"。直接引发中国 Kling/Seedance/Vidu
  等竞品的快速跟进。

significance: |
  Sora 发布是 2024 年 AI 行业最重要的里程碑之一。在此之前，
  AI 视频生成（Runway/Pika）只能生成几秒的低质片段。Sora
  展示了视频生成可以做到：
  - 60 秒长视频，角色和场景一致
  - 物理交互模拟（走路、光影、流体）
  - 3D 空间一致性（镜头运动不崩）

  行业影响：
  - 影视/广告/教育行业对 AI 替代的恐慌升级
  - 中国视频生成创业热潮（Kling/Seedance/Vidu 3 个月内跟进）
  - AI 生成内容（AIGC）真实性讨论白热化
  - 好莱坞编剧工会将 AI 视频生成纳入谈判条款

background: |
  2024 年 2 月 15 日 OpenAI 发布 Sora 技术报告和演示视频。
  初期仅限红队测试和少数创作者使用。2024 年 12 月向 ChatGPT
  Plus/Pro 用户开放。从发布到公测间隔 10 个月，期间 Kling
  等竞品已抢占市场。

