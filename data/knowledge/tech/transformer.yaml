summary: |
  论文 "Attention Is All You Need" 提出的神经网络架构，
  用自注意力机制替代 RNN，成为所有现代大语言模型的基础。

significance: |
  Transformer 是 AI 历史上最重要的架构突破之一。
  它解决了 RNN 无法并行训练的瓶颈，使得在超大规模数据上训练模型成为可能。
  GPT、BERT、Claude、Gemini、DeepSeek——所有现代 LLM 都基于 Transformer。
  可以说没有 Transformer 就没有今天的 AI 产业。

background: |
  2017 年 Google Brain 团队发表 "Attention Is All You Need"，
  最初目标是改进机器翻译。论文中的 self-attention 机制让模型
  可以并行处理整个序列，训练速度远超 LSTM/GRU。

  起初 NLP 社区并未立即意识到其潜力。2018 年 OpenAI 发布 GPT，
  Google 发布 BERT，两者都基于 Transformer，分别在生成和理解
  方向上开辟了新天地。2020 年 GPT-3 证明了 scaling 的力量，
  此后所有大模型都采用了 Transformer 或其变体（MoE with Transformer blocks）。

  2025 年后，虽然出现了 Mamba、RWKV 等非 Transformer 架构，
  但 Transformer 仍是绝对主流。

