summary: 'Anthropic 发布的开放协议，为 AI Agent 提供标准化的工具调用和

  上下文管理接口。AI Agent 的 "USB-C"——统一连接标准。

  '
significance: 'MCP 解决了 AI Agent 生态中最核心的问题：Agent 如何与外部工具、

  数据源、服务进行标准化交互。


  类似于 HTTP 对 Web 的意义，MCP 定义了一套 Client-Server 协议，

  让任何 AI 模型（不仅仅是 Claude）都可以通过统一的接口调用

  文件系统、数据库、API、浏览器等外部工具。


  MCP 已成为 AI Agent 开发的事实标准之一，被 Claude Code、

  Cursor、Zed 等主流 AI 编程工具广泛采用。2025-2026 年，

  MCP 生态爆炸式增长，社区贡献了数千个 MCP Server。

  '
background: '2024 年 11 月 Anthropic 发布 MCP 协议规范。

  协议分为 Client（AI 应用/Agent）和 Server（工具提供方）两层。

  Server 暴露 resources（数据）、tools（操作）、prompts（模板）。


  2025 年 MCP 社区快速扩张，覆盖文件系统、数据库、浏览器、

  API 网关等场景。OpenAI 和 Google 也开始支持 MCP 标准。

  '
