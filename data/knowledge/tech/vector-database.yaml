summary: |
  专门存储和检索高维向量嵌入的数据库，是 RAG（检索增强生成）
  和语义搜索的核心基础设施组件。

significance: |
  向量数据库的兴起与 LLM 应用爆发直接相关。

  传统数据库擅长精确匹配（SQL WHERE name = 'xxx'），
  但无法处理"找到与这句话意思最相似的段落"这类查询。
  向量数据库通过 ANN（近似最近邻）算法实现毫秒级的语义搜索。

  关键角色：
  - RAG 的"记忆层"：存储文档嵌入，检索最相关知识
  - Agent 的长期记忆：存储对话历史嵌入
  - 多模态搜索：图片、音频、视频嵌入

  代表产品：Pinecone、Weaviate、Milvus、Qdrant、Chroma。
  2024 年后，PostgreSQL（pgvector）和 Elasticsearch 也加入
  向量搜索能力，"向量化"成为数据库标配。

background: |
  2019 年前，Faiss（Meta）是主要的向量搜索库。
  2019-2021 年 Milvus、Pinecone 等专用向量数据库相继出现。
  2023 年 LLM 应用爆发，向量数据库成为 RAG 生态的标配。
  2024 年后传统数据库纷纷内置向量搜索。

