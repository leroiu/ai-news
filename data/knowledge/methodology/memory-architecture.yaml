summary: 'AI Agent 的长期和短期记忆系统设计方法论。

  从 session memory 到 persistent knowledge，

  从向量检索到结构化卡片。

  '
significance: 'Memory 决定了 AI Agent 能"记住"什么、能跨多长时间工作。

  短期记忆 = 上下文窗口管理，长期记忆 = RAG + Knowledge Base。


  2024-2026 年 Memory 架构从"把所有东西塞进 context"

  演进为"分层记忆"——工作记忆 / 短期记忆 / 长期记忆 / 知识库。


  AI Intelligence Platform 自身的 Knowledge Card、Inbox 归档、

  Context Guardian 都是 Memory Architecture 的具体实践。

  '
