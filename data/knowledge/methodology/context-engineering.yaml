summary: '系统化设计和优化 LLM 的上下文窗口内容，包括 system prompt、memory、rules、

  hook 等所有 AI 能"看到"的信息。

  '
significance: 'Context Engineering 将 "Prompt Engineering" 升级为系统工程：

  不只是写一段 prompt，而是设计 AI 在对话中能看到的一切——

  包括 CLAUDE.md、memory 文件、governance 规则、project 上下文、hook 反馈。


  这在 Claude Code 等技术中得到充分体现：一个 Agent 的有效性

  很大程度上取决于 contexts 的质量和结构。


  核心原则：Context 越结构化，AI 越可预测。

  '
