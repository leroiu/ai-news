summary: 'AI Agent 将复杂任务分解为可执行子步骤的方法论。

  将"帮我做 X"转化为"步骤1→步骤2→步骤3→完成"的计划树。

  '
significance: 'Planning 使 Agent 能够处理超出一个回复范围的复杂任务。

  从单一的"回答问题"升级到"执行一个项目"。


  常见范式：Plan-and-Execute、Tree-of-Thought、Graph-of-Thought。

  Claude Code 的 Plan Mode、task breakdown 都是 Planning 的实践。


  核心挑战：计划过于刚性 vs 过于灵活之间的平衡。

  2026 年趋势：动态 Planning——Agent 在执行中实时调整计划。

  '
