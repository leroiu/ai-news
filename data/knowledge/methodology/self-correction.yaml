summary: 'AI 系统自动检测并修正自身错误的方法论。

  包括 Reflexion、Self-Refine、CRITIC 等变体。

  '
significance: 'Self-Correction 是 AI 从"一次生成"到"迭代改进"的关键方法。

  与人类写作/编码的过程类似——先写初稿，再检查和修改。


  核心模式：

  - Self-Refine: 模型审视自己的输出、找出问题、重新生成

  - Reflexion: 失败后反思原因，调整策略再尝试

  - Critic + Rewrite: 一个角色指出问题，另一个角色修改

  - Verification Loop: 自动验证 → 不通过 → 修正 → 再验证


  2024-2026 年 Self-Correction 已成为 Agent 系统的标配能力。

  Claude Code 的自我审查、Devin 的自动修复 bug 都依赖此方法论。

  '
