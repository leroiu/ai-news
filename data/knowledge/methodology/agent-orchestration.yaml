summary: '编排和调度 AI Agent 执行复杂多步骤工作流的方法论。

  包括 Pipeline、Parallel、DAG、动态路由等编排模式。

  '
significance: 'Agent Orchestration 是 AI 从"单次问答"升级到"自主完成工作"

  的核心技术。本质上是 AI 的工作流引擎。


  核心概念：

  - Pipeline: 线性步骤链（A → B → C → D）

  - Parallel: 并发执行独立任务（A + B + C → 聚合）

  - DAG: 有向无环图（复杂依赖关系）

  - Dynamic Routing: 根据中间结果动态选择下一步

  - Human-in-the-Loop: 关键节点暂停等待人工审批


  2025-2026 年，Agent Orchestration 正在从 research concept

  快速走向生产环境。Claude Code 的 Workflow 系统、

  OpenAI Agents SDK、LangGraph 都是 Orchestration 的产品化。

  '
