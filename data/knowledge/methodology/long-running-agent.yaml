summary: '设计和运行能持续数小时甚至数天的自主 AI Agent 的方法论，

  解决状态管理、上下文压缩、故障恢复等核心挑战。

  '
significance: 'Long-Running Agent 是 AI Agent 从"一次性对话"走向

  "持续自主工作"的关键挑战。核心问题包括：

  - 上下文窗口管理（什么时候 compact）

  - 任务状态持久化（停了怎么恢复）

  - 长周期任务分解（大任务拆小任务）

  - 自主决策边界（什么可以自己决定）


  Anthropic 和 OpenAI 都在 2025-2026 年大量投入这个方向。

  Claude Code 的长时间 session、自动 compact、Context Guardian

  都是对这个问题的方法论实践。

  '
