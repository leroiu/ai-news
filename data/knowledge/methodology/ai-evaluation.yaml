evolution:
- date: 2018
  event: GLUE / SuperGLUE 基准
- date: 2021
  event: MMLU 发布
- date: 2023
  event: LLM-as-Judge 方法（MT-Bench, AlpacaEval）
- date: 2024
  event: SWE-bench 成为编码能力标准
- date: 2025-2026
  event: 任务驱动评估取代简单基准
timeline:
- date: 2018
  event: GLUE 基准发布，首次统一 NLU 评估标准（9 任务）
- date: '2019'
  event: SuperGLUE 发布，GPT-3 后 GLUE 被"超额完成"，需要更难基准
- date: 2020
  event: MMLU 发布（57 学科、15908 道选择题），成为 LLM 知识评估事实标准
- date: 2022-11
  event: HELM (Stanford CRFM) 发布，首次系统化多维评估 LLM（准确率、公平性、毒性等）
- date: 2023-05
  event: Chatbot Arena (LMSYS) 上线，引入 Elo 人工投票排名，成为最受关注的 LLM 排行榜
- date: 2024-10
  event: SWE-bench Verified 发布，成为代码 Agent 能力评估标准
