summary: '系统化评估 AI 模型和 AI 系统输出质量的方法论。

  包括基准测试、人工评估、LLM-as-Judge、红队测试等。

  '
significance: 'AI Evaluation 是"如何知道 AI 好不好用"的系统方法。

  没有好的评估，就没有可靠的 AI 产品。


  核心维度：

  - 能力评估：MMLU、HumanEval、SWE-bench 等基准

  - 安全评估：红队测试、越狱检测、毒性检测

  - 任务评估：特定业务场景的准确率/召回率

  - 对比评估：A/B 测试模型或 Prompt 版本

  - LLM-as-Judge：用更强的模型评估输出质量


  2025-2026 年趋势：从"基准数字"转向"任务驱动的真实评估"。

  SWE-bench Verified 比 MMLU 分数更有说服力。

  '
domain: AI 质量保证
