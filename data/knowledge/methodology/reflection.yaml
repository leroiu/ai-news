timeline:
- date: 2022-12
  event: Self-Consistency (Wang et al.) 发表，多次采样 + 投票 = 隐式反思
- date: 2023-03
  event: Reflexion 论文发布（Shinn et al.），Agent 从执行失败中学习并重试
- date: 2023-07
  event: Self-Refine (Madaan et al.) 发表，迭代式自我批评 + 自我改进
- date: 2024-06
  event: Claude 的"反思"能力成为产品特性，AI 在输出前自动检查
- date: 2025-03
  event: Reflection 从论文变成 Agent 框架的标准内置特性
