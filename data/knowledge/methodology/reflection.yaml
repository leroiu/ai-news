summary: 'AI Agent 在执行后自我审视和纠错的方法论。让 Agent 在输出最终结果前

  检查自己的工作——"先做，再反思，再修正"。

  '
significance: 'Reflection 是提升 AI Agent 输出质量的关键技术。

  不再依赖"一次生成就期望正确"，而是给 Agent 一个

  结构化地自我检查和修正的机会。


  ReAct (Reason + Act) 闭环中 Reflection 是必不可少的步骤。

  Claude Code 的 self-review、test-then-fix 循环

  都是 Reflection 的具体实现。


  2025-2026 年趋势：从"人工 review AI"到"AI Review AI"。

  '
