summary: 'Anthropic 提出的 Agent 工程方法论，强调将 AI Agent 视为软件系统进行设计和测试，

  而非黑箱提示词。

  '
significance: 'Harness Engineering 是 AI Agent 从"提示词魔法"走向"软件工程"的转折点。

  核心思想：Agent 不是模型，而是一个包含模型、工具、记忆、环境的软件系统。

  应该用软件工程的 discipline 来设计、测试、部署和监控 Agent。


  这直接影响了 Claude Code、MCP、AI 编程工具的设计哲学。

  也是理解 Anthropic 产品思路的关键概念。

  '
