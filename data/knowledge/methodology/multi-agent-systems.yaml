summary: '多个 AI Agent 协同工作的方法论。包括角色分工、通信协议、

  任务分解、结果聚合等模式。

  '
significance: '多 Agent 系统是 2025-2026 年 AI 工程最热门的前沿方向。

  单个 LLM 的能力有限，但多个 Agent 分工协作可以：

  - 分解复杂任务（规划 Agent → 编码 Agent → 测试 Agent → 审查 Agent）

  - 交叉验证（多个 Agent 从不同角度审查同一输出）

  - 角色扮演（模拟用户/专家/审查者多方对话）


  关键模式：

  - Supervisor-Worker: 一个主管 Agent 分配任务

  - Peer-to-Peer: Agent 之间平等通信

  - Adversarial: 对抗性协作（吹毛求疵 + 改进）

  - Hierarchical: 多层嵌套 Agent 网络


  Anthropic 的 Workflow/Agent 工具、OpenAI Swarm、LangGraph

  都是多 Agent 系统的基础设施。

  '
