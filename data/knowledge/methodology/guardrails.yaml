summary: '在 AI 系统中设置安全护栏的方法论。包括输入验证、输出过滤、

  内容安全检测、PII 脱敏、事实性校验等。

  '
significance: 'Guardrails 是将 AI 从"能用"提升到"敢用"的关键技术。

  企业客户最关心的问题不是模型多强，而是"会不会出安全事故"。


  核心能力：

  - Input Guard: 拦截有害注入/越狱攻击

  - Output Guard: 过滤有害/违规/幻觉内容

  - PII Detection: 检测和脱敏个人身份信息

  - Factuality Check: 校验输出是否与给定事实一致

  - Rate Limiting: 防止滥用


  2025-2026 年 Guardrails AI、NVIDIA NeMo Guardrails、

  Guardrails Hub 等工具生态日趋成熟。

  '
domain: AI 安全与合规
