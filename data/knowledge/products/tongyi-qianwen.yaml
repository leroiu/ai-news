summary: |
  阿里巴巴的 AI 助手产品，品牌涵盖 C 端 APP（通义千问）和 B 端
  开放平台（百炼）。通义千问依托阿里云和 Qwen 模型家族，在
  企业服务场景有独特优势，同时覆盖钉钉 AI、淘宝 AI 等场景。

significance: |
  通义千问的独特定位是"云原生 AI 平台"——不像豆包/Kimi 走
  纯 C 端路线，通义有 B 端企业服务和 C 端用户两条腿。

  核心组成：
  - 通义千问 APP：C 端 AI 助手，对话/搜索/文档/生图
  - 百炼平台：B 端模型训练和部署平台
  - 钉钉 AI：企业办公场景 AI 助手
  - 阿里云 Model Studio：模型托管和 API 服务

  通义的最大壁垒是阿里云生态——数百万企业客户天然就是
  AI 服务的潜在用户。

background: |
  2023 年 4 月阿里巴巴发布通义千问大模型和同名 APP。2024 年
  百炼平台上线，提供模型微调和部署服务。2025 年 Qwen 2.5
  模型接入通义全线产品，同时钉钉全面 AI 化。

