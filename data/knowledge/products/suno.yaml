summary: |
  AI 音乐生成平台，用户可以通过文字描述（prompt）或歌词
  生成完整的歌曲，包括旋律、编曲和人声。

significance: |
  Suno 代表了生成式 AI 向创意领域拓展的重要方向。

  在文本（ChatGPT）、图像（Midjourney）、视频（Sora）
  之后，AI 音乐是下一个前沿。Suno 让完全没有音乐训练的人
  也能"创作"歌曲——输入风格描述和歌词，几分钟内生成
  完整的带人声曲目。

  Suno 引发的技术与法律争议：
  - 版权问题：AI 音乐能否获得版权？训练数据是否侵权？
  - 音乐产业变革：与唱片公司合作 vs. 对抗
  - AI 音乐的"原创性"：创作工具的民主化

  到 2026 年，AI 音乐已成为独立创作者的主流工具之一，
  Suno 是最受欢迎的平台，月活用户超过千万。

background: |
  Suno 由前 Kensho/AI 研究者创立，最初聚焦音乐信息检索。
  2023 年底发布音乐生成功能后爆发式增长。
  2024 年推出 Suno v3，音乐质量大幅提升。
  2025 年推出 Suno v4，支持更长曲目和更多风格。
  2026 年与多家音乐厂牌达成授权合作。

