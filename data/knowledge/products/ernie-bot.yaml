summary: |
  百度的 AI 助手产品，中国首个对标 ChatGPT 的大模型应用。
  文心一言依托百度搜索和知识图谱，在中文知识问答和实时信息
  获取方面有天然优势。2025 年品牌升级为"文小言"。

significance: |
  文心一言的战略意义在于"搜索 + AI"——百度作为中国最大搜索
  引擎，有海量实时数据和知识图谱积累，这使得文心一言在事实性
  问答和实时信息方面表现突出。

  与豆包/Kimi 的竞争：
  - 豆包胜在产品体验和流量分发
  - Kimi 胜在长上下文技术
  - 文心一言胜在知识深度和搜索整合

  2025 年品牌升级为"文小言"后，定位更年轻的 AI 伴侣，
  同时保持企业级 API（千帆平台）的 B 端布局。

background: |
  2023 年 3 月文心一言正式发布，首批邀请测试。2023 年 8 月
  面向公众开放。2024 年持续迭代，2025 年品牌升级为"文小言"。
  同时百度千帆大模型平台向企业提供 API 服务。

