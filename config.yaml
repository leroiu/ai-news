# ==============================================================
# AI News 配置文件
# 修改 RSS 源、分类体系、用户兴趣，无需改动代码
# ==============================================================

# --- RSS 源 ---
# 每个源: name (显示名称), url (RSS/Atom 地址), enabled (是否启用)
sources:
  - name: "TechCrunch AI"
    url: "https://techcrunch.com/category/artificial-intelligence/feed/"
    enabled: true

  - name: "The Verge AI"
    url: "https://www.theverge.com/rss/ai-artificial-intelligence/index.xml"
    enabled: true

  - name: "ArXiv AI"
    url: "https://rss.arxiv.org/rss/cs.AI"
    enabled: true
    note: "仅工作日更新，周末无内容属于正常行为"

  - name: "VentureBeat AI"
    url: "https://venturebeat.com/category/ai/feed/"
    enabled: true

  - name: "MIT Technology Review AI"
    url: "https://www.technologyreview.com/feed/"
    enabled: true

  - name: "Hacker News (AI 相关)"
    url: "https://hnrss.org/frontpage?q=ai+OR+llm+OR+gpt+OR+claude+OR+agent+OR+openai+OR+anthropic"
    enabled: true

  - name: "OpenAI Blog"
    url: "https://openai.com/blog/rss.xml"
    enabled: true

  - name: "Anthropic Research"
    url: "https://raw.githubusercontent.com/Olshansk/rss-feeds/main/feeds/feed_anthropic_research.xml"
    enabled: true
    note: "社区维护源，非官方 RSS。Anthropic 暂不提供官方 RSS"

  - name: "Anthropic Engineering"
    url: "https://raw.githubusercontent.com/Olshansk/rss-feeds/main/feeds/feed_anthropic_engineering.xml"
    enabled: true
    note: "社区维护源"

  - name: "Google AI Blog"
    url: "https://blog.research.google/feeds/posts/default?category=AI"
    enabled: true

  - name: "DeepMind Blog"
    url: "https://deepmind.google/blog/rss.xml"
    enabled: true

  - name: "Reddit r/MachineLearning"
    url: "https://www.reddit.com/r/MachineLearning/.rss"
    enabled: true
    note: "Reddit ML 社区，学术+工业前沿讨论"

  - name: "Reddit r/artificial"
    url: "https://www.reddit.com/r/artificial/.rss"
    enabled: true
    note: "Reddit AI 综合社区"

  - name: "Hacker News (全部)"
    url: "https://hnrss.org/frontpage"
    enabled: true
    note: "HN 首页（未过滤），与 AI 过滤版互补覆盖更广"

  - name: "GitHub Trending (Python)"
    url: "https://github.com/trending/python?since=daily"
    type: "html"
    enabled: true
    note: "HTML 解析，BeautifulSoup 提取仓库信息"

  - name: "ArXiv CS.CL"
    url: "https://rss.arxiv.org/rss/cs.CL"
    enabled: true
    note: "计算语言学，与大模型相关度高"

  # ── 中文直连 RSS 源 ──
  - name: "36氪"
    url: "https://36kr.com/feed"
    enabled: false
    note: "36氪官方综合 RSS；覆盖科技与创业，依赖后续分类和评分筛选 AI 相关内容"

  # ── Twitter/X v2 API 源 ──
  # 需要 TWITTER_BEARER_TOKEN 环境变量 (从 developer.twitter.com 获取)
  # Basic 套餐: 500k 推文/月, 搜索 60 req/15min, 用户时间线 100 req/15min

  - name: "Twitter: AI Breaking News"
    type: "twitter"
    query: "AI OR LLM OR GPT OR Claude OR agent OR OpenAI OR Anthropic OR DeepSeek -is:retweet lang:en"
    max_results: 15
    enabled: false
    note: "AI 关键词搜索(英文)，需要 TWITTER_BEARER_TOKEN"

  - name: "Twitter: AI 中文速报"
    type: "twitter"
    query: "AI OR 大模型 OR GPT OR Claude OR DeepSeek OR Agent -is:retweet lang:zh"
    max_results: 10
    enabled: false
    note: "AI 关键词搜索(中文)"

  - name: "Twitter: AI Labs"
    type: "twitter"
    users:
      - "OpenAI"
      - "AnthropicAI"
      - "GoogleDeepMind"
      - "MetaAI"
      - "DeepSeek"
    max_results: 5
    enabled: false
    note: "AI 实验室官方账号推文"

  # ── 微信公众号 (RSS 桥接) ──
  # 微信无官方 RSS，通过 RSSHub 桥接。
  # RSSHub 路由: /wechat/mp/profile/{biz_id}
  # biz_id 获取方式: 打开公众号文章 → 复制链接中的 __biz= 参数
  # RSSHub 公共实例: https://rsshub.app (非官方，稳定性不保证)
  # 建议自部署: docker run -p 1200:1200 diygodme/rsshub

  - name: "WeChat: 机器之心"
    url: "https://rsshub.app/wechat/mp/profile/MzA3NTI1MjYwOQ=="
    type: "wechat"
    biz_id: "MzA3NTI1MjYwOQ=="
    enabled: false
    note: "机器之心公众号 (RSSHub 桥接)，如不稳定建议自部署 RSSHub"

  - name: "WeChat: 量子位"
    url: "https://rsshub.app/wechat/mp/profile/MzIzMjUwMjMzOQ=="
    type: "wechat"
    biz_id: "MzIzMjUwMjMzOQ=="
    enabled: false
    note: "量子位公众号 (RSSHub 桥接)"

  - name: "WeChat: 新智元"
    url: "https://rsshub.app/wechat/mp/profile/MzAwNjI5MjI0Nw=="
    type: "wechat"
    biz_id: "MzAwNjI5MjI0Nw=="
    enabled: false
    note: "新智元公众号 (RSSHub 桥接)"

  - name: "WeChat: AI 科技评论"
    url: "https://rsshub.app/wechat/mp/profile/MzU2NjUwMzIxNQ=="
    type: "wechat"
    biz_id: "MzU2NjUwMzIxNQ=="
    enabled: false
    note: "AI 科技评论公众号 (RSSHub 桥接)"

# --- 分类体系 ---
# AI 将根据此分类体系为每篇文章分配标签
categories:
  - "大模型发布"
  - "开源模型"
  - "Agent"
  - "编程/AI Coding"
  - "视频生成"
  - "图像生成"
  - "语音"
  - "机器人"
  - "芯片/算力"
  - "融资/商业"
  - "论文/研究"
  - "政策/监管"
  - "安全/对齐"
  - "工具/平台"
  - "行业应用"
  - "人物/观点"

# --- 分类规则 ---
classifier:
  method: rules_first   # rules_first（规则优先）| llm_only（纯 LLM）
  rule_threshold: 0.6   # 规则置信度 ≥ 此值时直接采纳，不调 LLM
  max_categories: 3     # 每篇文章最多分类数

  # 关键词规则：命中任一 pattern 即为该分类投票
  # 置信度 = 匹配项数 / 总规则项数
  keyword_rules:
    - category: "大模型发布"
      patterns:
        - "(发布|推出|launch|release|发布).*?(模型|GPT|Claude|Gemini|Llama|DeepSeek)"
        - "(GPT|Claude|Gemini|Llama|DeepSeek).*?(发布|推出|发布|开源)"
      weight: 3
    - category: "开源模型"
      patterns:
        - "(开源|open.?source|开源发布|社区版)"
        - "(Hugging.?Face|huggingface).*(模型|model)"
      weight: 2
    - category: "Agent"
      patterns:
        - "(Agent|agent|MCP|function.?calling|tool.?use|AI.?代理)"
        - "(Agentic|自主代理|multi.?agent|多Agent)"
      weight: 2
    - category: "编程/AI Coding"
      patterns:
        - "(编程|代码|code|coding|Copilot|IDE|代码生成|编码)"
        - "(Claude Code|GitHub Copilot|Cursor|Windsurf)"
      weight: 2
    - category: "视频生成"
      patterns:
        - "(视频|video|文生视频|Sora|Runway|Pika|视频生成|视频编辑)"
      weight: 2
    - category: "图像生成"
      patterns:
        - "(图像|图片|image|文生图|Stable Diffusion|Midjourney|DALL.E)"
      weight: 2
    - category: "语音"
      patterns:
        - "(语音|speech|TTS|STT|声音|voice|语音合成|语音识别)"
      weight: 2
    - category: "机器人"
      patterns:
        - "(机器人|robot|具身|embodied|人形|humanoid|自动驾驶|self.?driving)"
      weight: 2
    - category: "芯片/算力"
      patterns:
        - "(芯片|chip|GPU|NPU|TPU|算力|compute|推理优化|H100|B100)"
      weight: 2
    - category: "融资/商业"
      patterns:
        - "(融资|funding|种子轮|A轮|收购|acquisition|IPO|营收|revenue)"
      weight: 2
    - category: "论文/研究"
      patterns:
        - "(论文|paper|研究|research|arxiv|技术报告|technical.?report)"
      weight: 2
    - category: "政策/监管"
      patterns:
        - "(政策|policy|监管|regulation|法案|AI.?Act|出口管制|伦理)"
      weight: 1
    - category: "安全/对齐"
      patterns:
        - "(安全|safety|对齐|alignment|红队|red.?team|偏见|bias|幻觉|hallucination)"
      weight: 1
    - category: "工具/平台"
      patterns:
        - "(工具|tool|平台|platform|API|SaaS|SDK|框架|framework)"
      weight: 1
    - category: "行业应用"
      patterns:
        - "(医疗|health|法律|legal|金融|finance|教育|education|行业应用)"
      weight: 1
    - category: "人物/观点"
      patterns:
        - "(访谈|interview|观点|opinion|Sam Altman|Demis Hassabis|Yann LeCun)"
      weight: 1

# --- 概念挖掘 ---
concept_miner:
  enabled: true           # 是否启用
  top_n: 10               # 每轮最多挖掘 N 篇文章（按评分排序）
  min_score: 3            # ★3+ 才能进入候选
  batch_size: 20
  concurrency: 3
  skip_low_authority: true  # 跳过低权威来源（不在 source_scores 白名单且 score<50）
  high_authority_sources:
    - "OpenAI Blog"
    - "Anthropic Research"
    - "Google AI Blog"
    - "DeepMind Blog"
    - "ArXiv AI"
    - "ArXiv CS.CL"

# --- 用户兴趣 ---
# 权重影响评分。高权重内容得分更高。
interests:
  high:
    - "Claude Code"
    - "AI Agent"
    - "MCP"
    - "DeepSeek"
    - "Kimi"
    - "AI Coding"
  medium:
    - "AI 自动化工作流"
    - "AI 创业"
    - "国产大模型"
    - "开源模型发布"
    - "RAG"
  low:
    - "AI 绘画"
    - "AI 音乐"
    - "纯学术论文"
    - "视频生成"

# --- 降级模式 ---
# 所有 LLM 不可用时，Pipeline 仍能生成基础日报
degradation:
  # 降级模式下跳过所有 LLM 调用
  skip_all_llm: false
  # 基础日报内容标志（用于日志和前端标记）
  minimal_report: false

# --- 摘要 ---
summarizer:
  # 只对 Top N 篇文章调用 LLM 摘要，其余使用 fallback
  top_n: 100
  # Fallback 摘要截取原文前 N 字符
  fallback_truncate: 200

# --- 评分 ---
scoring:
  method: rules    # rules（规则评分）| llm（AI 评分，已弃用）

  # 四维权重（总和=1.0）
  weights:
    source_authority: 0.30   # 来源权威性
    keyword_match: 0.30      # 关键词匹配
    recency: 0.20            # 时效性
    high_authority_bonus: 0.20  # 高权威来源加成

  # 来源权威分 (0-100)
  source_scores:
    "OpenAI Blog": 95
    "Anthropic Research": 90
    "Google AI Blog": 85
    "DeepMind Blog": 85
    "ArXiv AI": 70
    "ArXiv CS.CL": 65
    "MIT Technology Review AI": 60
    "TechCrunch AI": 55
    "VentureBeat AI": 55
    "GitHub Trending (Python)": 55
    "Hacker News (AI 相关)": 50
    "The Verge AI": 50
    "Hacker News (全部)": 40
    "36氪": 40
    "Reddit r/MachineLearning": 35
    "Reddit r/artificial": 30
  source_default: 30

  # 关键词加分（命中一项累加，上限100）
  keyword_boost:
    - patterns:
        - "发布|推出|launch|release|open.?source|milestone|breakthrough|开源"
      score: 20
    - patterns:
        - "更新|upgrade|改进|合作|partnership|融资|funding|收购"
        - "论文|research|study|benchmark|评测"
      score: 10
    - patterns:
        - "{interests_high}"
      score: 15
  keyword_penalty:
    - patterns:
        - "广告|sponsored|opinion|评论|观点"
      score: -15

  # 时效性（小时）
  recency:
    peak_hours: 24     # 24h 内满分
    decay_hours: 72    # 72h 线性衰减到最低分
    min_score: 10      # 最低时效分

  # 高权威来源列表（额外加成基础）
  high_authority_sources:
    - "OpenAI Blog"
    - "Anthropic Research"
    - "Google AI Blog"
    - "DeepMind Blog"

  # 星级阈值（百分制 → 星级）
  thresholds:
    star_5: 85
    star_4: 70
    star_3: 50
    star_2: 30
    star_1: 0

# --- 去重 ---
dedup:
  # URL 精确匹配 (始终启用)
  url_exact: true
  # 标题相似度阈值 (0-1, 0 禁用)
  title_similarity: 0.85
  # 缓存窗口 (天)
  cache_days: 7

# --- 输出 ---
output:
  # 日报输出目录
  reports_dir: "reports"
  # 是否只输出高评分文章 (>= 3星)
  min_score: 3

# --- 嵌入向量（语义搜索）---
# Provider 可插拔: siliconflow (默认) | openai | kimi | local
embeddings:
  provider: siliconflow
  # 混合搜索权重: 0.0 = 纯语义, 1.0 = 纯关键词
  alpha: 0.3

# --- 抓取 ---
fetch:
  # 单源超时 (秒)
  timeout: 30
  # 并发请求数
  concurrency: 5
  # 只保留最近 N 小时的文章，避免旧闻刷屏（如 OpenAI Blog 可能返回大量历史文章）
  max_age_hours: 72
